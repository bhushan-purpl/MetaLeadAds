<template>
    <div class="setup-container">

        <!-- ── Header ── -->
        <div class="setup-header">
            <div class="header-icon">🔗</div>
            <div class="header-text">
                <h1 class="header-title">Meta Webhook Setup</h1>
                <p class="header-sub">Manage your Facebook Lead Ads webhook subscription directly from Salesforce</p>
            </div>
            <div class="header-badge">
                <span class={tokenBadgeClass}>{tokenBadgeText}</span>
            </div>
        </div>

        <!-- ── Webhook URL Card ── -->
        <div class="card">
            <div class="card-header">
                <span class="card-icon">🌐</span>
                <h2>Webhook Endpoint</h2>
            </div>
            <p class="card-desc">Paste this URL into <strong>Meta for Developers → Webhooks → Edit Subscription → Callback URL</strong></p>
            <div class="copy-row">
                <input type="text" class="url-input" value={webhookUrl} readonly />
                <button class="copy-btn" onclick={copyWebhookUrl}>
                    <span if:true={copiedUrl}>✅ Copied!</span>
                    <span if:false={copiedUrl}>📋 Copy</span>
                </button>
            </div>

            <div class="field-group" style="margin-top:20px">
                <label class="field-label">Verify Token</label>
                <div class="copy-row">
                    <input type="text" class="url-input" value={verifyToken} readonly />
                    <button class="copy-btn" onclick={copyVerifyToken}>
                        <span if:true={copiedToken}>✅ Copied!</span>
                        <span if:false={copiedToken}>📋 Copy</span>
                    </button>
                </div>
                <p class="hint">Use this as the Verify Token in Meta for Developers webhook settings</p>
            </div>

            <div class="field-group" style="margin-top:20px">
                <label class="field-label">OAuth Redirect URL</label>
                <div class="copy-row">
                    <input type="text" class="url-input" value={redirectUrl} readonly />
                    <button class="copy-btn" onclick={copyRedirectUrl}>
                        <span if:true={copiedRedirect}>✅ Copied!</span>
                        <span if:false={copiedRedirect}>📋 Copy</span>
                    </button>
                </div>
                <p class="hint">Use this in Facebook Login for Business settings as the <strong>Valid OAuth Redirect URI</strong></p>
            </div>

            <div class="field-group" style="margin-top:20px">
                <label class="field-label">Salesforce Domain URL</label>
                <div class="copy-row">
                    <input type="text" class="url-input" value={domainUrl} readonly />
                    <button class="copy-btn" onclick={copyDomainUrl}>
                        <span if:true={copiedDomain}>✅ Copied!</span>
                        <span if:false={copiedDomain}>📋 Copy</span>
                    </button>
                </div>
                <p class="hint">Add this to the <strong>App Domains</strong> section in Meta App Basic Settings</p>
            </div>
        </div>

        <!-- ── Setup & Support Card ── -->
        <div class="card support-card" style="border-left: 4px solid #6c5ce7; background: linear-gradient(to right, #f3f0ff, #ffffff);">
            <div class="card-header">
                <span class="card-icon">💜</span>
                <h2 style="color: #6c5ce7;">Need Help with Setup?</h2>
            </div>
            <p class="card-desc">For advanced setup, beautiful Meta integration strategies, and expert support, please connect with the Purplstack Team.</p>
            
            <div class="action-row" style="margin-top: 20px;">
                <a href="https://purplstack.com/" target="_blank" class="btn btn-primary" style="background-color: #6c5ce7; border-color: #6c5ce7; text-decoration: none; padding: 12px 24px; border-radius: 6px; font-weight: bold;">
                    🌐 Visit Purplstack.com
                </a>
            </div>
        </div>

        <!-- ── Site Setup Guide Card ── -->
        <div class="card info-card" style="border-left: 4px solid #f39c12;">
            <div class="card-header">
                <span class="card-icon">⚙️</span>
                <h2>Site Setup Prerequisites</h2>
            </div>
            <p class="card-desc">Before configuring Meta, you must set up a Salesforce Site to expose the Webhook securely to the public internet.</p>
            <ol class="how-it-works">
                <li>Go to <strong>Setup → Sites</strong> and create a new Site (or use an active one).</li>
                <li>Open the Site and click on <strong>Public Access Settings</strong>.</li>
                <li>Under <strong>Object Settings</strong>, grant <strong>Read & Create</strong> permissions to:
                    <ul style="margin-top: 5px; margin-bottom: 5px; color: #555; list-style-type: disc; margin-left: 20px;">
                        <li><strong>Leads</strong></li>
                        <li><strong>Meta Lead Logs</strong></li>
                    </ul>
                </li>
                <li>Under <strong>Enabled Apex Class Access</strong>, add the following classes:
                    <ul style="margin-top: 5px; margin-bottom: 5px; color: #555; list-style-type: disc; margin-left: 20px;">
                        <li><code>MetaLeadWebhook</code></li>
                        <li><code>MetaOAuthCallback</code></li>
                    </ul>
                </li>
            </ol>
        </div>

        <!-- ── How It Works Card ── -->
        <div class="card info-card">
            <div class="card-header">
                <span class="card-icon">💡</span>
                <h2>How It Works</h2>
            </div>
            <ol class="how-it-works">
                <li><strong>Copy URLs</strong> — Use the URLs above to configure your Meta App and Webhooks.</li>
                <li><strong>Lead Submitted</strong> — When someone fills a Facebook Lead Ad form, Meta sends a webhook notification.</li>
                <li><strong>Auto-Captured</strong> — Salesforce receives the notification, fetches the full lead data, and creates a Lead record automatically.</li>
                <li><strong>Mapped</strong> — All fields are mapped as per your <em>Meta Field Mapping</em> custom metadata configuration.</li>
            </ol>
        </div>

    </div>
</template>
