<template>
    <div class="slds-form-element">
        <div class="slds-form-element__control">
            <div class="slds-combobox_container">
                <div class={comboboxClass} aria-expanded={isOpen} aria-haspopup="listbox" role="combobox">
                    
                    <div class="slds-combobox__form-element slds-input-has-icon slds-input-has-icon_right" role="none">
                        <!-- We use an input so the user can type to search -->
                        <input type="text"
                               class="slds-input slds-combobox__input"
                               aria-controls="listbox-id-1"
                               autocomplete="off"
                               role="textbox"
                               placeholder={placeholder}
                               value={inputValue}
                               onfocus={handleFocus}
                               onblur={handleBlur}
                               oninput={handleInput}
                               disabled={disabled} />
                               
                        <template if:true={showSearchIcon}>
                            <span class="slds-icon_container slds-icon-utility-search slds-input__icon slds-input__icon_right">
                                <lightning-icon icon-name="utility:search" size="x-small" class="slds-icon slds-icon slds-icon_x-small slds-icon-text-default"></lightning-icon>
                            </span>
                        </template>
                        <template if:true={showClearIcon}>
                            <button class="slds-button slds-button_icon slds-input__icon slds-input__icon_right" title="Remove selected option" onclick={handleClear}>
                                <lightning-icon icon-name="utility:clear" size="x-small" class="slds-button__icon"></lightning-icon>
                                <span class="slds-assistive-text">Remove selected option</span>
                            </button>
                        </template>
                    </div>

                    <div id="listbox-id-1" class="slds-dropdown slds-dropdown_fluid" role="listbox">
                        <ul class="slds-listbox slds-listbox_vertical" role="presentation">
                            <template for:each={filteredOptions} for:item="opt">
                                <li key={opt.value} role="presentation" class="slds-listbox__item" onmousedown={handleSelect} data-value={opt.value}>
                                    <div class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small" role="option">
                                        <span class="slds-media__figure slds-listbox__option-icon">
                                            <!-- Checkmark if selected -->
                                            <template if:true={opt.selected}>
                                                <lightning-icon icon-name="utility:check" size="x-small" class="slds-icon-utility-check slds-icon_container"></lightning-icon>
                                            </template>
                                        </span>
                                        <span class="slds-media__body">
                                            <span class="slds-truncate" title={opt.label}>{opt.label}</span>
                                        </span>
                                    </div>
                                </li>
                            </template>
                            
                            <template if:true={noOptionsFound}>
                                <li role="presentation" class="slds-listbox__item">
                                    <div class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small" role="option">
                                        <span class="slds-media__body">
                                            <span class="slds-truncate" title="No results found">No results found</span>
                                        </span>
                                    </div>
                                </li>
                            </template>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
